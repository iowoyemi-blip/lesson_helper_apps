<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graphing Quadratics (Standard Form)</title>
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }
        .correct-text { color: #166534; }
        .incorrect-text { color: #991b1b; }
        
        .correct-answer { border: 2px solid #22c55e !important; background-color: #f0fdf4 !important; }
        .incorrect-answer { border: 2px solid #ef4444 !important; background-color: #fef2f2 !important; }

        .graph-container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            position: relative;
            aspect-ratio: 1 / 1;
            border: 2px solid #cbd5e1;
            background-color: white;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            cursor: crosshair;
            border-radius: 0.5rem;
        }
        
        .graph-container svg {
            width: 100%;
            height: 100%;
            border-radius: 0.5rem;
        }

        input:disabled {
            background-color: #f1f5f9;
            color: #475569;
        }
    </style>
</head>
<body class="p-4 md:p-8 flex justify-center items-start min-h-screen">

    <main class="bg-white rounded-2xl shadow-xl w-full max-w-6xl overflow-hidden">
        <!-- Header & Stats -->
        <div class="bg-gray-800 text-white p-6 flex flex-col sm:flex-row justify-between items-center gap-4">
            <h1 class="text-2xl md:text-3xl font-bold">Graphing Quadratics (Standard Form)</h1>
            <div class="flex gap-6 text-lg font-semibold">
                <div id="scoreDisplay" class="bg-gray-700 px-4 py-2 rounded-lg">Score: 0</div>
                <div id="livesDisplay" class="bg-gray-700 px-4 py-2 rounded-lg text-red-400">Lives: ❤️❤️❤️</div>
            </div>
        </div>

        <div class="p-6">
            <!-- Problem Display -->
            <div class="mb-8 text-center bg-blue-50 border border-blue-200 rounded-xl p-6 shadow-sm">
                <h2 class="text-gray-600 font-semibold mb-2 uppercase tracking-wide">Graph the Equation:</h2>
                <div id="problem-display" class="text-4xl font-bold text-blue-900 font-serif"></div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 lg:gap-12">
                <!-- Left Column: Graph -->
                <div class="flex flex-col items-center">
                    <p class="text-sm text-gray-500 mb-3 font-medium text-center">Click to plot the <strong class="text-blue-600">vertex</strong> first, then click a <strong class="text-blue-600">second point</strong> to draw the parabola.</p>
                    <div id="svgGrid" class="graph-container">
                        <!-- viewBox maps to x: -10 to 10, y: 10 to -10 (because SVG y goes down) -->
                        <svg id="graph-svg" viewBox="-10 -10 20 20" preserveAspectRatio="xMidYMid meet"></svg>
                    </div>
                </div>

                <!-- Right Column: Table & Properties -->
                <div class="flex flex-col space-y-8">
                    
                    <!-- Table of Values -->
                    <div class="bg-gray-50 p-6 rounded-xl border border-gray-200">
                        <h3 class="text-lg font-bold text-gray-800 mb-4 text-center">Table of Values</h3>
                        <table class="w-full max-w-xs mx-auto text-center border-collapse bg-white rounded-lg shadow-sm overflow-hidden">
                            <thead>
                                <tr class="bg-gray-200 text-gray-700">
                                    <th class="p-3 border-b-2 border-gray-300 w-1/2">x</th>
                                    <th class="p-3 border-b-2 border-gray-300 w-1/2">y</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- 5 rows for table -->
                                <tr>
                                    <td class="p-2 border-b"><input type="number" id="table-x-0" class="w-full p-2 border rounded text-center font-mono x-input"></td>
                                    <td class="p-2 border-b"><input type="number" id="table-y-0" class="w-full p-2 border rounded text-center font-mono y-input"></td>
                                </tr>
                                <tr>
                                    <td class="p-2 border-b"><input type="number" id="table-x-1" class="w-full p-2 border rounded text-center font-mono x-input"></td>
                                    <td class="p-2 border-b"><input type="number" id="table-y-1" class="w-full p-2 border rounded text-center font-mono y-input"></td>
                                </tr>
                                <tr>
                                    <td class="p-2 border-b bg-blue-50"><input type="number" id="table-x-2" class="w-full p-2 border rounded text-center font-mono x-input bg-blue-50 font-bold text-blue-900" placeholder="Vertex x"></td>
                                    <td class="p-2 border-b bg-blue-50"><input type="number" id="table-y-2" class="w-full p-2 border rounded text-center font-mono y-input bg-white font-bold text-blue-900" placeholder="Vertex y"></td>
                                </tr>
                                <tr>
                                    <td class="p-2 border-b"><input type="number" id="table-x-3" class="w-full p-2 border rounded text-center font-mono x-input"></td>
                                    <td class="p-2 border-b"><input type="number" id="table-y-3" class="w-full p-2 border rounded text-center font-mono y-input"></td>
                                </tr>
                                <tr>
                                    <td class="p-2 border-b"><input type="number" id="table-x-4" class="w-full p-2 border rounded text-center font-mono x-input"></td>
                                    <td class="p-2 border-b"><input type="number" id="table-y-4" class="w-full p-2 border rounded text-center font-mono y-input"></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <!-- Properties -->
                    <div class="bg-gray-50 p-6 rounded-xl border border-gray-200">
                        <h3 class="text-lg font-bold text-gray-800 mb-4 text-center">Properties</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="flex flex-col">
                                <label class="text-sm font-semibold text-gray-600 mb-1">Vertex (x, y)</label>
                                <div class="flex gap-2">
                                    <input type="text" id="prop-vertex-x" class="w-full p-2 border rounded font-mono worksheet-input" placeholder="x (or full point)">
                                    <input type="text" id="prop-vertex-y" class="w-full p-2 border rounded font-mono worksheet-input" placeholder="y">
                                </div>
                            </div>
                            <div class="flex flex-col">
                                <label class="text-sm font-semibold text-gray-600 mb-1">Axis of Symmetry</label>
                                <input type="text" id="prop-aos" class="w-full p-2 border rounded font-mono worksheet-input" placeholder="x = ?">
                            </div>
                            <div class="flex flex-col">
                                <label class="text-sm font-semibold text-gray-600 mb-1">Extremum (Min/Max val)</label>
                                <input type="text" id="prop-minmax" class="w-full p-2 border rounded font-mono worksheet-input" placeholder="Value">
                            </div>
                            <div class="flex flex-col">
                                <label class="text-sm font-semibold text-gray-600 mb-1">y-intercept</label>
                                <input type="text" id="prop-y-int" class="w-full p-2 border rounded font-mono worksheet-input" placeholder="y or (0, y)">
                            </div>
                            <div class="flex flex-col">
                                <label class="text-sm font-semibold text-gray-600 mb-1">x-intercepts</label>
                                <input type="text" id="prop-x-int" class="w-full p-2 border rounded font-mono worksheet-input" placeholder="e.g. -2, 6">
                            </div>
                            <div class="flex flex-col">
                                <label class="text-sm font-semibold text-gray-600 mb-1">Range</label>
                                <input type="text" id="prop-range" class="w-full p-2 border rounded font-mono worksheet-input" placeholder="e.g. y >= -9">
                            </div>
                            <div class="flex flex-col md:col-span-2">
                                <label class="text-sm font-semibold text-gray-600 mb-1">Concavity</label>
                                <select id="prop-concavity" class="w-full p-2 border rounded font-mono worksheet-select">
                                    <option value="">-- Select --</option>
                                    <option value="Up">Up</option>
                                    <option value="Down">Down</option>
                                </select>
                            </div>
                        </div>
                    </div>

                </div>
            </div>

            <!-- Feedback & Controls -->
            <div class="mt-8 border-t border-gray-200 pt-8 text-center flex flex-col items-center">
                <div id="feedback-area" class="mb-6 h-12 flex items-center justify-center"></div>
                
                <button id="checkBtn" class="bg-blue-600 text-white font-bold py-3 px-10 rounded-xl hover:bg-blue-700 transition shadow-md w-full sm:w-auto text-lg">Check Answer</button>
                <button id="nextBtn" class="hidden bg-green-600 text-white font-bold py-3 px-10 rounded-xl hover:bg-green-700 transition shadow-md w-full sm:w-auto text-lg">Next Problem</button>
                <button id="restartBtn" class="hidden bg-red-600 text-white font-bold py-3 px-10 rounded-xl hover:bg-red-700 transition shadow-md w-full sm:w-auto text-lg">Play Again</button>
            </div>
        </div>
    </main>

    <script>
        // State variables
        let currentProblem = {};
        let studentVertex = null;
        let studentPoint2 = null;
        let score = 0;
        let lives = 3;
        let isGameOver = false;

        // DOM Elements
        const svgGrid = document.getElementById('graph-svg');
        const checkBtn = document.getElementById('checkBtn');
        const nextBtn = document.getElementById('nextBtn');
        const restartBtn = document.getElementById('restartBtn');
        const feedbackArea = document.getElementById('feedback-area');

        // SVG Helper functions
        function addSvgElement(tag, attrs) {
            const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
            for(let k in attrs) el.setAttribute(k, attrs[k]);
            svgGrid.appendChild(el);
            return el;
        }

        function createSvgGrid() {
            svgGrid.innerHTML = '';
            // Grid background
            addSvgElement('rect', {x: -10, y: -10, width: 20, height: 20, fill: '#ffffff'});
            
            // Draw lines
            for (let i = -10; i <= 10; i++) {
                const isAxis = (i === 0);
                const color = isAxis ? '#0f172a' : '#e2e8f0';
                const strokeWidth = isAxis ? '0.15' : '0.05';
                
                // Vertical lines
                addSvgElement('line', {x1: i, y1: -10, x2: i, y2: 10, stroke: color, "stroke-width": strokeWidth});
                // Horizontal lines
                addSvgElement('line', {x1: -10, y1: i, x2: 10, y2: i, stroke: color, "stroke-width": strokeWidth});
            }
        }

        function drawPoint(x, y, color, className) {
            addSvgElement('circle', {
                class: className,
                cx: x, 
                cy: -y, // SVG y is inverted
                r: 0.35, 
                fill: color
            });
        }

        function drawParabola(a, h, k, color, className) {
            let d = "";
            for (let x = -10; x <= 10; x += 0.5) {
                let y = a * Math.pow(x - h, 2) + k;
                let svgX = x;
                let svgY = -y; // SVG y is inverted
                
                if (x === -10) {
                    d += `M ${svgX} ${svgY} `;
                } else {
                    d += `L ${svgX} ${svgY} `;
                }
            }
            addSvgElement('path', {
                class: className,
                d: d,
                fill: 'none',
                stroke: color,
                "stroke-width": "0.2"
            });
        }

        function clearStudentDrawings() {
            document.querySelectorAll('.student-drawing, .answer-parabola').forEach(el => el.remove());
        }

        function updateStatsDisplay() {
            document.getElementById('scoreDisplay').innerText = `Score: ${score}`;
            document.getElementById('livesDisplay').innerText = `Lives: ${'❤️'.repeat(lives)}${'🖤'.repeat(3 - lives)}`;
        }

        function generateProblem() {
            clearStudentDrawings();
            studentVertex = null;
            studentPoint2 = null;
            feedbackArea.innerHTML = '';
            checkBtn.classList.remove('hidden');
            nextBtn.classList.add('hidden');
            
            // Ensure integer x-intercepts by picking valid a, h, and k
            const aChoices = [1, -1, 2, -2];
            let a = aChoices[Math.floor(Math.random() * aChoices.length)];
            
            // Limit vertex h to center to keep parabola visible
            let h = Math.floor(Math.random() * 9) - 4; // -4 to 4
            
            // Perfect square multiplier to guarantee integer roots
            let squares = Math.abs(a) === 1 ? [0, 1, 4, 9] : [0, 1, 4];
            let S = squares[Math.floor(Math.random() * squares.length)];
            
            // k must be opposite sign of 'a' for roots to exist (unless S=0)
            let k = -a * S; 
            
            // Standard form coefficients
            let b = -2 * a * h;
            let c = a * h * h + k;
            
            // X-intercepts calculation
            let xInts = [];
            if (S === 0) {
                xInts = [h];
            } else {
                xInts = [h - Math.sqrt(S), h + Math.sqrt(S)];
            }
            let xIntStr = xInts.sort((a,b) => a-b).join(', ');

            // Calculate table points centered around vertex
            let tablePoints = [];
            for(let i = 0; i < 5; i++) {
                let xVal = h - 2 + i;
                let yVal = a * Math.pow(xVal - h, 2) + k;
                tablePoints.push({x: xVal, y: yVal});
            }

            // Store problem data
            currentProblem = {
                a, b, c, h, k,
                vertex: {x: h, y: k},
                aos: h,
                minMax: k,
                yInt: c,
                xInt: xIntStr,
                concavity: a > 0 ? "Up" : "Down",
                range: a > 0 ? `>= ${k}` : `<= ${k}`,
                tablePoints
            };

            // Format equation y = ax^2 + bx + c
            let eqStr = "y = ";
            if (a === -1) eqStr += "-x²";
            else if (a !== 1) eqStr += a + "x²";
            else eqStr += "x²";
            
            if (b > 0) eqStr += (eqStr === "y = " ? "" : " + ") + (b === 1 ? "x" : b + "x");
            else if (b < 0) eqStr += " - " + (Math.abs(b) === 1 ? "x" : Math.abs(b) + "x");
            
            if (c > 0) eqStr += (eqStr === "y = " ? "" : " + ") + c;
            else if (c < 0) eqStr += " - " + Math.abs(c);
            
            if (eqStr === "y = ") eqStr = "y = 0"; // fallback just in case
            
            document.getElementById('problem-display').innerText = eqStr;

            // Reset UI Inputs
            document.querySelectorAll('.x-input, .y-input, .worksheet-input, .worksheet-select').forEach(el => {
                el.classList.remove('correct-answer', 'incorrect-answer');
                if (el.type !== 'select-one') {
                    el.value = '';
                }
                if (el.type === 'select-one') {
                    el.value = '';
                }
            });
        }

        function handleGraphClick(e) {
            if(isGameOver || document.getElementById('checkBtn').classList.contains('hidden')) return;
            
            const pt = svgGrid.createSVGPoint();
            pt.x = e.clientX;
            pt.y = e.clientY;
            const svgP = pt.matrixTransform(svgGrid.getScreenCTM().inverse());
            
            // Snap to grid
            const mathX = Math.round(svgP.x);
            const mathY = Math.round(-svgP.y); // un-invert y

            if (!studentVertex) {
                studentVertex = {x: mathX, y: mathY};
                drawPoint(mathX, mathY, '#2563eb', 'student-drawing'); // Blue
            } else if (!studentPoint2) {
                if(mathX === studentVertex.x && mathY === studentVertex.y) return; // ignore clicking vertex again
                studentPoint2 = {x: mathX, y: mathY};
                drawPoint(mathX, mathY, '#2563eb', 'student-drawing');
                
                // Calculate student's 'a' and draw parabola
                let studentA = (studentPoint2.y - studentVertex.y) / Math.pow(studentPoint2.x - studentVertex.x, 2);
                drawParabola(studentA, studentVertex.x, studentVertex.y, '#3b82f6', 'student-drawing');
            } else {
                // Reset points on third click
                clearStudentDrawings();
                studentVertex = {x: mathX, y: mathY};
                studentPoint2 = null;
                drawPoint(mathX, mathY, '#2563eb', 'student-drawing');
            }
        }

        // ==========================================
        // NORMALIZATION HELPERS (Highly Lenient)
        // ==========================================
        function normalizeInput(str) {
            return (str || '').toString()
                .replace(/\s/g, '')          // Strip all spaces
                .toLowerCase()
                .replace(/^[xy]=/, '')       // Strip "x=" or "y="
                .replace(/^y(?=[<>])/, '')   // Strip "y" only if part of an inequality
                .replace(/[()]/g, '')        // Strip parentheses
                .replace(/^0,/, '');         // Normalize y-intercepts ("0,40" -> "40")
        }

        function normalizeXInts(str) {
            return (str || '')
                .toLowerCase()
                .replace(/[\s{}]/g, '')      // remove spaces and curly brackets
                .replace(/x=/g, '')          // remove 'x='
                .split(',')
                .filter(val => val !== '')
                .sort((a, b) => parseFloat(a) - parseFloat(b)) // strictly sort numerically
                .join(',');
        }

        function checkAnswer() {
            let errorMsgs = [];
            const { tablePoints, vertex, aos, minMax, yInt, xInt, concavity, range, a, h, k } = currentProblem;
            
            // 1. Check Table of Values
            let isTableCorrect = true;
            for (let i = 0; i < 5; i++) {
                const xInput = document.getElementById(`table-x-${i}`);
                const yInput = document.getElementById(`table-y-${i}`);
                
                if (parseFloat(xInput.value) !== tablePoints[i].x) {
                    xInput.classList.add('incorrect-answer');
                    isTableCorrect = false;
                } else {
                    xInput.classList.add('correct-answer');
                    xInput.classList.remove('incorrect-answer');
                }
                
                if (parseFloat(yInput.value) !== tablePoints[i].y) {
                    yInput.classList.add('incorrect-answer');
                    isTableCorrect = false;
                } else {
                    yInput.classList.add('correct-answer');
                    yInput.classList.remove('incorrect-answer');
                }
            }

            // 2. Check Graph Points
            let isGraphCorrect = false;
            if (studentVertex && studentPoint2) {
                const isVertexCorrect = studentVertex.x === vertex.x && studentVertex.y === vertex.y;
                const expectedY = a * Math.pow(studentPoint2.x - h, 2) + k;
                const isPoint2Correct = studentPoint2.y === expectedY;
                
                if (isVertexCorrect && isPoint2Correct) {
                    isGraphCorrect = true;
                }
            }

            // 3. Check Properties
            let isPropertiesCorrect = true;
            
            const checkProp = (el, correctVal) => {
                let userVal = normalizeInput(el.value);
                
                if (el.id === 'prop-x-int') {
                    const userClean = normalizeXInts(el.value);
                    const correctClean = normalizeXInts(correctVal);
                    if (userClean !== correctClean) {
                        el.classList.add('incorrect-answer');
                        isPropertiesCorrect = false;
                    } else {
                        el.classList.add('correct-answer');
                        el.classList.remove('incorrect-answer');
                    }
                } else if (userVal !== normalizeInput(correctVal.toString())) {
                    el.classList.add('incorrect-answer');
                    isPropertiesCorrect = false;
                } else {
                    el.classList.add('correct-answer');
                    el.classList.remove('incorrect-answer');
                }
            };

            // Custom Vertex Checking (handles if they put the full coord in the first box)
            let vxVal = document.getElementById('prop-vertex-x').value;
            let vyVal = document.getElementById('prop-vertex-y').value;
            const userVertex = vyVal.trim() === '' ? vxVal : `(${vxVal},${vyVal})`;
            
            if (normalizeInput(userVertex) !== normalizeInput(`(${vertex.x},${vertex.y})`)) {
                document.getElementById('prop-vertex-x').classList.add('incorrect-answer');
                document.getElementById('prop-vertex-y').classList.add('incorrect-answer');
                isPropertiesCorrect = false;
            } else {
                document.getElementById('prop-vertex-x').classList.add('correct-answer');
                document.getElementById('prop-vertex-y').classList.add('correct-answer');
                document.getElementById('prop-vertex-x').classList.remove('incorrect-answer');
                document.getElementById('prop-vertex-y').classList.remove('incorrect-answer');
            }

            checkProp(document.getElementById('prop-aos'), aos);
            checkProp(document.getElementById('prop-minmax'), minMax);
            checkProp(document.getElementById('prop-y-int'), yInt);
            checkProp(document.getElementById('prop-x-int'), xInt);
            checkProp(document.getElementById('prop-concavity'), concavity);
            checkProp(document.getElementById('prop-range'), range);

            // Generate Error Messages
            if (!isTableCorrect) errorMsgs.push("Check your table of values.");
            if (!isGraphCorrect) errorMsgs.push("Check your graphed points (needs correct vertex and 1 point on curve).");
            if (!isPropertiesCorrect) errorMsgs.push("Check your properties.");

            // Feedback & Progress
            if (isTableCorrect && isGraphCorrect && isPropertiesCorrect) {
                score += 10;
                updateStatsDisplay();
                feedbackArea.innerHTML = `<p class="correct-text text-xl font-bold">Great job! All correct!</p>`;
                checkBtn.classList.add('hidden');
                nextBtn.classList.remove('hidden');
            } else {
                lives--;
                updateStatsDisplay();
                if (lives <= 0) {
                    isGameOver = true;
                    feedbackArea.innerHTML = `<p class="incorrect-text text-xl font-bold">Game Over! Final Score: ${score}</p>`;
                    checkBtn.classList.add('hidden');
                    restartBtn.classList.remove('hidden');
                    
                    // Show correct answer visually
                    clearStudentDrawings();
                    drawParabola(a, h, k, '#ef4444', 'answer-parabola'); // Red for correct answer on game over
                } else {
                    feedbackArea.innerHTML = `<p class="incorrect-text text-lg font-semibold">Oops! ${errorMsgs.join(' ')}</p>`;
                }
            }
        }

        function handleRestart() {
            lives = 3;
            score = 0;
            isGameOver = false;
            updateStatsDisplay();
            restartBtn.classList.add('hidden');
            generateProblem();
        }

        // --- Event Listeners ---
        svgGrid.addEventListener('click', handleGraphClick);
        checkBtn.addEventListener('click', checkAnswer);
        nextBtn.addEventListener('click', generateProblem);
        restartBtn.addEventListener('click', handleRestart);

        // --- Initial Setup ---
        document.addEventListener('DOMContentLoaded', () => {
            createSvgGrid();
            generateProblem();
            updateStatsDisplay();
        });
    </script>
</body>
</html>
